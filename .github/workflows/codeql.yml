name: CodeQL SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly on Wednesday at 02:00 UTC
    - cron: '0 2 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF results
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3
        with:
          languages: ${{ matrix.language }}
          # Use default queries + security-extended suite
          queries: security-extended

      - name: Build for CodeQL
        run: cargo build --lib

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3
        with:
          category: "/language:${{ matrix.language }}"
